repos:
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        stages: [pre-commit]

  - repo: https://github.com/PyCQA/isort
    rev: 8.0.1
    hooks:
      - id: isort
        stages: [pre-commit]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml"]
        stages: [pre-commit]

  - repo: https://github.com/PyCQA/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        additional_dependencies: [flake8-bandit]
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: run-tests-with-coverage
        name: Run tests and generate coverage.xml
        entry: python -m pytest --cov=sc4net --cov-report=xml -q
        language: system
        pass_filenames: false
        stages: [pre-push]

  - repo: https://github.com/kelsoncm/pytest-coverage-gate
    rev: v1.0.3
    hooks:
      - id: pytest-coverage-gate
        stages: [pre-push]
