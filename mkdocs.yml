site_name: sc4net
site_url: https://kelsoncm.github.io/sc4net
site_description: Network helpers for HTTP(S) and FTP downloads, with convenience JSON and ZIP readers.
site_author: Kelson da Costa Medeiros
repo_url: https://github.com/kelsoncm/sc4net
repo_name: kelsoncm/sc4net
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - API Reference: api.md
  - Changelog: changelog.md
  - Contributing: contributing.md
  - Security: security.md
